# Build the Windows .geode on CI (§5.1) — the lower-friction path than cross-compiling
# from macOS. Download the artifact and drop it into the Wine prefix's GD mods folder.
name: Build mod

on:
  push:
    paths:
      - 'mod/**'
      - '.github/workflows/build-mod.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build (Win64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: Win64
          working-directory: mod

  package:
    name: Package artifacts
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: geode-sdk/build-geode-mod/combine@main
        id: build
      - uses: actions/upload-artifact@v4
        with:
          name: gdhighway-tap.geode
          path: ${{ steps.build.outputs.build-output }}
