# Build the Windows .geode on CI (§5.1) — the lower-friction path than cross-compiling
# from macOS. Download the artifact and drop it into the Wine prefix's GD mods folder.
name: Build mod

on:
  push:
    paths:
      - 'mod/**'
      - '.github/workflows/build-mod.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build (Win64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: Win64
          path: mod
          # The SDK version resolved from mod.json ("given", the default) pins an fmt
          # release that fails to compile under the Clang shipped on current
          # windows-latest runners (a consteval/Clang strictness incompatibility).
          # nightly pins a newer fmt specifically past that bug.
          sdk: nightly
          # Geode's CMake setup auto-generates a precompiled header for the mod target
          # that independently re-includes Geode.hpp (and thus <windows.h>) ahead of our
          # own translation unit, so any include-order fix inside main.cpp/net.hpp never
          # reaches it — the legacy <winsock.h> it drags in collides with our <winsock2.h>
          # regardless. This mod is small enough that PCH buys nothing; disable it.
          configure-args: -DGEODE_DISABLE_PRECOMPILED_HEADERS=ON

  package:
    name: Package artifacts
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: geode-sdk/build-geode-mod/combine@main
        id: build
      - uses: actions/upload-artifact@v4
        with:
          name: gdhighway-tap.geode
          path: ${{ steps.build.outputs.build-output }}
